apiVersion: v1
kind: Namespace
metadata:
  name: exonomy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgedge-config
  namespace: exonomy
data:
  pgedge.conf: |
    shared_preload_libraries = 'spock'
    wal_level = logical
    max_worker_processes = 20
    max_replication_slots = 20
    max_wal_senders = 20
    track_commit_timestamp = on
    spock.conflict_resolution = 'last_update_wins'
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pgedge
  namespace: exonomy
spec:
  serviceName: "pgedge"
  replicas: 2
  selector:
    matchLabels:
      app: pgedge
  template:
    metadata:
      labels:
        app: pgedge
    spec:
      containers:
      - name: pgedge
        image: pgedge/pgedge:latest
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_PASSWORD
          value: "exonomy-secret"
        volumeMounts:
        - name: config-volume
          mountPath: /etc/postgresql/conf.d/
        - name: data-volume
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: config-volume
        configMap:
          name: pgedge-config
  volumeClaimTemplates:
  - metadata:
      name: data-volume
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: pgedge
  namespace: exonomy
spec:
  selector:
    app: pgedge
  ports:
  - protocol: TCP
    port: 5432
    targetPort: 5432
  clusterIP: None
