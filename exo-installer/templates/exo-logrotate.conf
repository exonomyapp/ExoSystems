# 🧠 EDUCATIONAL CONTEXT: Logrotate Configuration
# Without rotation, log files grow unbounded and eventually fill the disk.
# This config ensures all Exosystem logs are rotated daily, compressed,
# and retained for 7 days — balancing diagnostic utility with disk hygiene.
/var/log/exo/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 exo-sys exo-sys
    postrotate
        systemctl reload exo-conscia.service > /dev/null 2>&1 || true
    endscript
}
